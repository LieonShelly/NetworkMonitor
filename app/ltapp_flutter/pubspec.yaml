name: ltapp_flutter
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  go_router: ^17.0.0
  dio: ^5.9.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  flutter_svg: ^2.0.9    
  intl: ^0.20.2          
  flutter_secure_storage: ^10.0.0
  cached_network_image: ^3.4.1
  scroll_to_index: ^3.0.1
  lt_annotation:
    path: 'packages/lt_annotation'
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.5
  web3dart: ^2.7.3
  http: ^1.6.0




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf

    - family: FeltTipSeniorRegular
      fonts:
        - asset: assets/fonts/FeltTipSeniorRegular.ttf
        
    - family: PoppinsMediumItalic
      fonts:
        - asset: assets/fonts/Poppins-MediumItalic.ttf

    - family: VividlyRegular
      fonts:
        - asset: assets/fonts/VividlyRegular.ttf