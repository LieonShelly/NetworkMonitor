name: ltapp_flutter
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3 # 使用代码生成简化 Riverpod 写法

  # 路由管理
  go_router: ^13.0.0

  # 网络请求
  dio: ^5.4.0

  # 数据类生成 & 比较 (Clean架构必备)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI组件库 (针对日历模块)
  table_calendar: ^3.0.9 # 业界最强的Flutter日历组件
  flutter_svg: ^2.0.9    # 用于加载手绘风格的矢量图标
  intl: ^0.19.0          # 日期格式化

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # 代码生成器
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
