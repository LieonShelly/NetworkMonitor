---
include: 
  - ../../fastlane/project/settings.yml

name: UIComponent

settings:
  groups:
    - BaseProjectSetting


packages:
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    from: 4.5.2

targets:
  UIComponent:
    type: framework
    platform: iOS
    sources:
      - Source
    settings:
      groups:
        - BaseTargetSetting
    dependencies:
      - package: Lottie
shemes:
  UIComponent:
    templates:
      - DefaultSchemeTemplate
    templateArributes:
      testTargetName: UIComponent
