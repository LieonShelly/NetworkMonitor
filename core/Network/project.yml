name: Network
options:
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.44.1"
  bundleIdPrefix: com.little.things
  deploymentTarget: 
    iOS: "18.0"
    defaultConfig: Debug
settings:
  GENERATE_INFOPLIST_FILE: true
targets:
  LTNetwork:
    type: framework
    platform: iOS
    sources:
      - Source
    settings:
      base:
        SWIFT_VERSION: 6.0
        PRODUCT_BUNDLE_IDENTIFIER: com.little.things.network
        IPHONE_DEPLOYMENT_TARGET: 18.0
shemes:
  LTNetwork:
    templates:
      - DefaultSchemeTemplate
    templateArributes:
      testTargetName: LTNetwork
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        ENABLE_USER_SCRIPT_SANDBOXING: false



SchemeTemplates:
  DefaultSchemeTemplate:
    templates:
      - DefaultScheme
    build:
      targets:
        ${scheme_name}: build
  
  DefaultScheme:
    test:
      targets:
        - name: "${testTargetName}"
          randomExecutionOrder: false
      gatherCoverageData: true
      language: en
      region: US
      coverageTargets:
        - name: "${testTargetName}"

