configs:
  Debug: debug
  Release: release

options:
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.44.1"
  bundleIdPrefix: com.little.things
  deploymentTarget: 
    iOS: "18.0"
    defaultConfig: Debug

settingGroups:
  BaseProjectSetting:
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: true

SchemeTemplates:
  DefaultSchemeTemplate:
    templates:
      - DefaultScheme
    build:
      targets:
        ${scheme_name}: build
  
  DefaultScheme:
    test:
      targets:
        - name: "${testTargetName}"
          randomExecutionOrder: false
      gatherCoverageData: true
      language: en
      region: US
      coverageTargets:
        - name: "${testTargetName}"

